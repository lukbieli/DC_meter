name: ESP-IDF Build CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IDF_PATH: ${{ github.workspace }}/esp-idf
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESP-IDF tools
        run: |
          python -m pip install --upgrade pip
          pip install setuptools
          git clone --depth 1 https://github.com/espressif/esp-idf.git esp-idf
          cd esp-idf
          ./install.sh esp32
          . ./export.sh
        shell: bash

      - name: Fix submodules and dependencies
        run: |
          git submodule update --init --recursive
          # Clone esp-idf-lib if not present (for CI only)
          if [ ! -d "esp-idf-lib" ]; then
            git clone --depth 1 https://github.com/UncleRus/esp-idf-lib.git esp-idf-lib
          fi
        shell: bash

      - name: Build project
        run: |
          . ./esp-idf/export.sh
          idf.py build
        shell: bash

      - name: Archive build output
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/
